                    { hue: 240, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                    { hue: 270, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                    { hue: 300, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                    { hue: 330, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                ];

                const EXPLOSION_PATTERNS = {
                    CIRCLE: 'circle',
                    SPARKLE: 'sparkle',
                    VORTEX: 'vortex',
                    RAINBOW: 'rainbow',
                    RING: 'ring',
                    SUN: 'sun',
                    BURST: 'burst',
                    CASCADE: 'cascade',
                    HEART: 'heart',
                    METEOR_SHOWER: 'meteor_shower',
                    FIRE_TREE: 'fire_tree',
                    ELLIPSE: 'ellipse',
                    CHRYSANTHEMUM: 'chrysanthemum',
                    PARAMETRIC_CIRCLE: 'parametric_circle',
                    PARAMETRIC_ELLIPSE: 'parametric_ellipse',
                    PARAMETRIC_STAR: 'parametric_star',
                    SPIRAL_PARAMETRIC: 'spiral_parametric'
                };

                const random = (min, max) => Math.random() * (max - min) + min;
                const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

                const weightedPatterns = (function() {
                    const wp = [];
                    const normalPatterns = [
                        EXPLOSION_PATTERNS.CIRCLE, EXPLOSION_PATTERNS.SPARKLE,
                        EXPLOSION_PATTERNS.VORTEX, EXPLOSION_PATTERNS.RAINBOW,
                        EXPLOSION_PATTERNS.RING, EXPLOSION_PATTERNS.SUN,
                        EXPLOSION_PATTERNS.BURST, EXPLOSION_PATTERNS.CASCADE
                    ];
                    const counts = [6, 6, 6, 6, 6, 5, 5, 5];
                    for (let i = 0; i < normalPatterns.length; i++) {
                        for (let j = 0; j < counts[i]; j++) wp.push(normalPatterns[i]);
                    }
                    for (let i = 0; i < 54; i++) wp.push(EXPLOSION_PATTERNS.PARAMETRIC_CIRCLE);
                    for (let i = 0; i < 18; i++) wp.push(EXPLOSION_PATTERNS.PARAMETRIC_ELLIPSE);
                    for (let i = 0; i < 14; i++) wp.push(EXPLOSION_PATTERNS.PARAMETRIC_STAR);
                    for (let i = 0; i < 4; i++) wp.push(EXPLOSION_PATTERNS.SPIRAL_PARAMETRIC);
                    for (let i = 0; i < 27; i++) wp.push(EXPLOSION_PATTERNS.HEART);
                    for (let i = 0; i < 18; i++) wp.push(EXPLOSION_PATTERNS.METEOR_SHOWER);
                    for (let i = 0; i < 11; i++) wp.push(EXPLOSION_PATTERNS.FIRE_TREE);
                    for (let i = 0; i < 7; i++) wp.push(EXPLOSION_PATTERNS.ELLIPSE);
                    for (let i = 0; i < 27; i++) wp.push(EXPLOSION_PATTERNS.CHRYSANTHEMUM);
                    return wp;
                })();

                function getRandomExplosionPattern() {
                    return weightedPatterns[randomInt(0, weightedPatterns.length - 1)];
                }

                function getRandomColorConfig(pattern) {
                    if (pattern === EXPLOSION_PATTERNS.CHRYSANTHEMUM) {
                        const cc = COLOR_PRESETS.filter(c => c.type === 'chrysanthemum');
                        return cc[randomInt(0, cc.length - 1)];
                    }
                    const c1 = COLOR_PRESETS[randomInt(0, COLOR_PRESETS.length - 1)];
                    if (Math.random() < 0.3) {
                        const c2 = COLOR_PRESETS[randomInt(0, COLOR_PRESETS.length - 1)];
                        return { hue: c1.hue, saturation: c1.saturation, lightness: c1.lightness, type: 'dual',
                            secondHue: c2.hue, secondSaturation: c2.saturation, secondLightness: c2.lightness };
                    }
                    return c1;
                }

                const TextParticleMode = { SEQUENTIAL: 1, SCATTER: 2 };

                class TextParticle {
                    constructor(char, x, y, hue, opts) {
                        this.char = char;
                        this.x = x;
                        this.y = y;
                        this.hue = hue;
                        this.life = 1.0;
                        this.age = 0;
                        this.fontSize = (opts && opts.fontSize) || random(70, 110);
                        this.rotSpeed = random(-0.3, 0.3);
                        this.rotation = 0;
                        this.wobble = random(0, Math.PI * 2);
                        this._fontStr = 'bold ' + this.fontSize + 'px "Ma Shan Zheng",cursive,sans-serif';
                        this._glowFontStr = 'bold ' + (this.fontSize + 6) +
                            'px "Ma Shan Zheng",cursive,sans-serif';
                        this._glowRgb = hslToRgbPrefix(hue, 100, 85);
                        this._mainRgb = hslToRgbPrefix(hue, 100, 70);
                        this.mode = (opts && opts.mode) || TextParticleMode.SCATTER;
                        this.startDecayDelay = (opts && opts.startDecayDelay) || 0;
                        this.appearDelay = (opts && opts.appearDelay) || 0;
                        this.appeared = false;
                        if (this.mode === TextParticleMode.SEQUENTIAL) {
                            this.vx = random(-5, 5);
                            this.vy = random(-8, -2);
                            this.decayRate = random(0.18, 0.22);
                            this.targetX = x;
                            this.targetY = y;
                            this.currentAlpha = 0;
                            this.fadeInSpeed = random(0.8, 1.2);
                        } else {
                            const angle = random(0, Math.PI * 2);
                            const speed = random(160, 380);
                            this.vx = Math.cos(angle) * speed;
                            this.vy = Math.sin(angle) * speed - random(50, 160);
                            this.decayRate = random(0.12, 0.22);
                            this.currentAlpha = 1.0;
                        }
                    }
                    update(dt) {
                        const ds = dt / 1000;
                        this.age += dt;
                        if (this.age < this.appearDelay) return true;
                        if (!this.appeared) this.appeared = true;
                        if (this.mode === TextParticleMode.SEQUENTIAL) {
                            this.x += this.vx * ds;
                            this.y += this.vy * ds;
                            this.vy += GRAVITY * 0.03 * ds;
                            if (this.currentAlpha < 1.0) {
                                this.currentAlpha += this.fadeInSpeed * ds;
                                if (this.currentAlpha > 1.0) this.currentAlpha = 1.0;
                            }
                            if (this.age - this.appearDelay >= this.startDecayDelay) {
                                this.life -= this.decayRate * ds;
                                this.currentAlpha = Math.max(0, this.life);
                            }
                            this.rotation += this.rotSpeed * ds * 0.15;
                            this.wobble += ds * 1.5;
                        } else {
                            this.x += this.vx * ds;
                            this.y += this.vy * ds;
                            this.vy += GRAVITY * 0.5 * ds;
                            this.vx += WIND * random(-0.025, 0.025) * ds;
                            const airDamp = Math.exp(AIR_RES_EXP_CONST * ds);
                            this.vx *= airDamp;
                            this.vy *= airDamp;
                            if (this.age >= this.startDecayDelay) {
                                this.life -= this.decayRate * ds;
                            }
                            this.currentAlpha = this.life;
                            this.rotation += this.rotSpeed * ds;
                            this.wobble += ds * 3;
                        }
                        return this.life > 0 && this.y < canvas.height + 80;
                    }
                    draw(ctx) {
                        const alpha = this.currentAlpha;
                        if (alpha <= 0.01) return;
                        if (!this.appeared) return;
                        const rot = this.rotation + Math.sin(this.wobble) * (this.mode === TextParticleMode
                            .SEQUENTIAL ? 0.03 : 0.1);
                        ctx.save();
                        ctx.translate(this.x, this.y);
                        ctx.rotate(rot);
                        ctx.font = this._glowFontStr;
                        ctx.fillStyle = this._glowRgb + (alpha * 0.25) + ')';
                        ctx.fillText(this.char, -(this.fontSize + 6) / 2, (this.fontSize + 6) / 2);
                        ctx.font = this._fontStr;
                        ctx.fillStyle = this._mainRgb + alpha + ')';
                        ctx.fillText(this.char, -this.fontSize / 2, this.fontSize / 2);
                        ctx.restore();
                    }
                }

                function launchTextSequential(text, cx, cy, startDecayDelay, fontSizeMin, fontSizeMax) {
                    startDecayDelay = startDecayDelay || 0;
                    const sw = window.innerWidth;
                    if (sw <= 375) { fontSizeMin = fontSizeMin || 48;
                        fontSizeMax = fontSizeMax || 68; } else if (sw <= 480) { fontSizeMin = fontSizeMin || 58;
                        fontSizeMax = fontSizeMax || 82; } else if (sw <= 768) { fontSizeMin = fontSizeMin || 72;
                        fontSizeMax = fontSizeMax || 100; } else { fontSizeMin = fontSizeMin || 90;
                        fontSizeMax = fontSizeMax || 130; }
                    const brightHues = [0, 20, 40, 55, 120, 180, 200, 260, 290, 320, 10, 340];
                    const chars = text.split('');
                    let charSpacing = fontSizeMin * 1.15;
                    let totalWidth = (chars.length - 1) * charSpacing;
                    if (totalWidth > sw * 0.9) {
                        charSpacing = (sw * 0.9) / (chars.length - 1);
                        totalWidth = (chars.length - 1) * charSpacing;
                    }
                    const startX = cx - totalWidth / 2;
                    for (let i = 0; i < chars.length; i++) {
                        const hue = brightHues[randomInt(0, brightHues.length - 1)];
                        const fontSize = random(fontSizeMin, fontSizeMax);
                        const charX = startX + i * charSpacing;
                        const charY = cy + random(-8, 8);
                        const appearDelay = i * 350;
                        const opts = {
                            mode: TextParticleMode.SEQUENTIAL,
                            startDecayDelay: startDecayDelay + 4000,
                            appearDelay: appearDelay,
                            fontSize: fontSize
                        };
                        textParticles.push(new TextParticle(chars[i], charX, charY, hue, opts));
                    }
                    const sparklePerChar = sw <= 480 ? 6 : 12;
                    for (let i = 0; i < chars.length; i++) {
                        (function(idx) {
                            setTimeout(function() {
                                const px = startX + idx * charSpacing;
                                for (let j = 0; j < sparklePerChar; j++) {
                                    const hue = brightHues[randomInt(0, brightHues.length - 1)];
                                    const p = new Particle(px + random(-15, 15), cy + random(-15, 15), { hue: hue,
                                        saturation: 100, lightness: 80, type: 'single' }, 0.35);
                                    p.baseSize = random(0.5, 1.8);
                                    p.decayRate = random(0.3, 0.6);
                                    particles.push(p);
                                }
                            }, idx * 350 + 100);
                        })(i);
                    }
                }

                class HeartExplosionManager {
                    constructor(x, y, colorConfig, explosionPower) {
                        this.x = x;
                        this.y = y;
                        this.colorConfig = colorConfig;
                        this.explosionPower = explosionPower;
                        this.createdAt = frameNow;
                        this.lifetime = 1500;
                        this.heartParticles = [];
                        this.createHeartParticles();
                    }
                    createHeartParticles() {
                        const baseCount = isMobile ? randomInt(60, 90) : randomInt(90, 140);
                        const particleCount = Math.floor(baseCount * particleMultiplier);
                        for (let i = 0; i < particleCount; i++) {
                            const t = (i / particleCount) * Math.PI * 2;
                            this.heartParticles.push(new SimplifiedHeartParticle(this.x, this.y, this.colorConfig,
                                this.explosionPower, t));
                        }
                    }
                    update(deltaTime) {
                        const elapsed = frameNow - this.createdAt;
                        const hp = this.heartParticles;
                        for (let i = hp.length - 1; i >= 0; i--) hp[i].update(deltaTime, elapsed);
                        return elapsed < this.lifetime;
                    }
                    draw(ctx) { const hp = this.heartParticles;
                        for (let i = 0, len = hp.length; i < len; i++) hp[i].draw(ctx); }
                }

                class SimplifiedHeartParticle {
                    constructor(x, y, colorConfig, explosionPower, phase) {
                        this.originalX = x;
                        this.originalY = y;
                        this.colorConfig = colorConfig;
                        this.baseSize = random(1.5, 2.5);
                        this.currentSize = this.baseSize;
                        this.life = 1.0;
                        this.t = phase;
                        this.scale = 5.5 * explosionPower;
                        this.twinkleSpeed = random(0.8, 1.5);
                        this.twinklePhase = random(0, Math.PI * 2);
                        this.twinkleAmount = random(0.1, 0.2);
                        this.x = x;
                        this.y = y;
                        const hue = colorConfig.hue,
                            sat = colorConfig.saturation,
                            lit = colorConfig.lightness;
                        this._rgb = hslToRgbPrefix(hue, sat, lit);
                        this._dualRgb = colorConfig.type === 'dual' ? hslToRgbPrefix(colorConfig.secondHue || hue,
                            colorConfig.secondSaturation || sat, colorConfig.secondLightness || lit) : null;
                        this.updatePositionFromParametric();
                    }
                    updatePositionFromParametric() {
                        const sinT = Math.sin(this.t),
                            cosT = Math.cos(this.t);
                        const cos2T = Math.cos(2 * this.t),
                            cos3T = Math.cos(3 * this.t),
                            cos4T = Math.cos(4 * this.t);
                        const heartX = 16 * sinT * sinT * sinT;
                        const heartY = 13 * cosT - 5 * cos2T - 2 * cos3T - cos4T;
                        this.x = this.originalX + heartX * this.scale;
                        this.y = this.originalY - heartY * this.scale;
                    }
                    update(deltaTime, elapsed) {
                        this.life = Math.max(0, 1 - elapsed / 1500);
                        if (Math.random() < 0.3) { this.x += random(-0.8, 0.8);
                            this.y += random(-0.8, 0.8); }
                        const twinkle = Math.sin(frameNow * 0.001 * this.twinkleSpeed + this.twinklePhase) * this
                            .twinkleAmount;
                        this.currentSize = this.baseSize * (1 + twinkle) * this.life;
                        return this.life > 0;
                    }
                    draw(ctx) {
                        const alpha = this.life * 0.9;
                        const rgb = this._dualRgb && Math.random() > 0.5 ? this._dualRgb : this._rgb;
                        ctx.fillStyle = rgb + alpha + ')';
                        const s = this.currentSize;
                        if (s < 2) { ctx.fillRect(this.x - s, this.y - s, s * 2, s * 2); } else { ctx.beginPath();
                            ctx.arc(this.x, this.y, s, 0, 6.2832);
                            ctx.fill(); }
                    }
                }

                class Particle {
                    constructor(x, y, colorConfig, explosionPower, explosionPattern) {
                        this.x = x;
                        this.y = y;
                        this.explosionPower = explosionPower || 1;
                        this.explosionPattern = explosionPattern || 'circle';
                        this.baseSize = random(0.9, 2.3) * (this.explosionPattern.indexOf('SPARKLE') >= 0 ? 0.82 : 0.98);
                        this.size = this.baseSize;
                        this.isFireSpark = true;
                        this.fireSparkDuration = random(0.12, 0.32);
                        this.life = 1.0;
                        this.decayRate = random(0.13, 0.36);
                        this.verticalWeight = random(0.55, 1.1);
                        this.createdAt = frameNow;
                        const baseSpeed = random(185, 350) * this.explosionPower;
                        const angle = random(0, Math.PI * 2);
                        this.vx = Math.cos(angle) * baseSpeed;
                        this.vy = Math.sin(angle) * baseSpeed;
                        if (this.explosionPattern === 'sparkle') { this.vx *= 0.65;
                            this.vy *= 0.65; }
                        if (this.explosionPattern.indexOf('PARAMETRIC') < 0) { this.vx += random(-35, 35);
                            this.vy += random(-35, 35); }
                        this._rgb = hslToRgbPrefix(colorConfig.hue, colorConfig.saturation, colorConfig.lightness);
                        this._fireSparkRgb = hslToRgbPrefix(60, 100, 88);
                    }
                    update(deltaTime) {
                        const ds = deltaTime / 1000;
                        this.x += this.vx * ds;
                        this.y += this.vy * ds;
                        this.vy += GRAVITY * this.verticalWeight * ds;
                        this.vx += WIND * random(-0.016, 0.016) * ds;
                        const airDamp = Math.exp(AIR_RES_EXP_CONST * ds);
                        this.vx *= airDamp;
                        this.vy *= airDamp;
                        this.life -= this.decayRate * ds;
                        const aliveTime = (frameNow - this.createdAt) / 1000;
                        if (this.isFireSpark && aliveTime > this.fireSparkDuration) this.isFireSpark = false;
                        this.size = this.baseSize * this.life;
                        return this.life > 0 && this.y < canvas.height + 90;
                    }
                    draw(ctx) {
                        const alpha = this.life;
                        if (alpha <= 0) return;
                        if (this.isFireSpark) { ctx.fillStyle = this._fireSparkRgb + (alpha * 0.88) + ')'; } else { ctx
                                .fillStyle = this._rgb + (alpha * 0.82) + ')'; }
                        const s = this.size;
                        if (s < 2) { ctx.fillRect(this.x - s, this.y - s, s * 2, s * 2); } else { ctx.beginPath();
                            ctx.arc(this.x, this.y, s, 0, 6.2832);
                            ctx.fill(); }
                    }
                }

                class Firework {
                    constructor(x, targetY, colorConfig) {
                        this.x = x;
                        this.y = canvas.height;
                        this.targetY = targetY;
                        this.colorConfig = colorConfig;
                        this.speed = random(380, 620);
                        this.exploded = false;
                        this.explosionPower = random(1.25, 2.1);
                        this.explosionPattern = getRandomExplosionPattern();
                        this.lineLength = random(11, 28);
                        this.explosionCount = 0;
                        this.maxExplosions = isMobile ? randomInt(2, 4) : randomInt(3, 6);
                    }
                    update(deltaTime) {
                        if (!this.exploded) {
                            const ds = deltaTime / 1000;
                            this.y -= this.speed * ds;
                            if (this.y <= this.targetY) { this.explode(); return false; }
                            return true;
                        }
                        return false;
                    }
                    explode() {
                        this.exploded = true;
                        this.explosionCount++;
                        this.createExplosion(this.x, this.y, this.explosionPower * (isMobile ? 1.0 : 1.2), this
                            .explosionPattern);
                        if (this.explosionCount < this.maxExplosions) {
                            setTimeout(() => { this.createSubsequentExplosion(); }, isMobile ? random(150, 400) : random(
                                120, 350));
                        }
                    }
                    createSubsequentExplosion() {
                        this.explosionCount++;
                        const distance = random(70, 185);
                        const angle = random(0, Math.PI * 2);
                        const newX = this.x + Math.cos(angle) * distance;
                        const newY = this.y + Math.sin(angle) * distance;
                        this.createExplosion(newX, newY, this.explosionPower * (isMobile ? random(0.5, 0.8) : random(0.6,
                            0.9)), this.explosionPattern);
                        if (this.explosionCount < this.maxExplosions) {
                            setTimeout(() => { this.createSubsequentExplosion(); }, isMobile ? random(150, 400) : random(
                                120, 350));
                        }
                    }
                    createExplosion(x, y, power, pattern) {
                        if (pattern === EXPLOSION_PATTERNS.HEART) { heartExplosions.push(new HeartExplosionManager(x, y,
                                this.colorConfig, power)); return; }
                        if (pattern === EXPLOSION_PATTERNS.METEOR_SHOWER) {
                            const mc = Math.floor((isMobile ? randomInt(5, 10) : randomInt(8, 14)) * particleMultiplier);
                            for (let i = 0; i < mc; i++) { const m = new Meteor(x + random(-32, 32), y + random(-32, 32),
                                    this.colorConfig);
                                m.speed *= power;
                                particles.push(m); }
                            return;
                        }
                        if (pattern === EXPLOSION_PATTERNS.FIRE_TREE) {
                            const treeCount = Math.floor((isMobile ? randomInt(70, 110) : randomInt(120, 200)) *
                                particleMultiplier);
                            for (let i = 0; i < treeCount; i++) { particles.push(new FireTreeParticle(x, y,
                                    getRandomColorConfig('chrysanthemum'), power * random(0.8, 1.2))); }
                            const sc = Math.floor((isMobile ? 20 : 40) * particleMultiplier);
                            for (let i = 0; i < sc; i++) {
                                const spark = new Particle(x + random(-60, 60), y + random(-30, 30), { hue: random(30, 55),
                                    saturation: 100, lightness: 80, type: 'single' }, power * random(0.2, 0.4));
                                spark.baseSize = random(0.4, 1.2);
                                spark.decayRate = random(0.3, 0.6);
                                particles.push(spark);
                            }
                            return;
                        }
                        if (pattern === EXPLOSION_PATTERNS.CHRYSANTHEMUM) {
                            const pc = Math.floor((isMobile ? randomInt(120, 180) : randomInt(200, 320)) *
                                particleMultiplier);
                            for (let i = 0; i < pc; i++) { particles.push(new ChrysanthemumParticle(x, y, this
                                    .colorConfig, power, false)); }
                            const sc = Math.floor((isMobile ? randomInt(20, 35) : randomInt(35, 55)) *
                            particleMultiplier);
                            for (let i = 0; i < sc; i++) { particles.push(new ChrysanthemumParticle(x, y, this
                                    .colorConfig, power * 0.5, true)); }
                            for (let i = 0; i < 12; i++) {
                                const flash = new Particle(x + random(-10, 10), y + random(-10, 10), { hue: this.colorConfig
                                        .hue, saturation: 80, lightness: 95, type: 'single' }, 0.15);
                                flash.baseSize = random(2, 5);
                                flash.decayRate = random(0.3, 0.6);
                                particles.push(flash);
                            }
                            return;
                        }
                        const pc = Math.floor(randomInt(55, 110) * particleMultiplier);
                        for (let i = 0; i < pc; i++) particles.push(new Particle(x, y, this.colorConfig, power,
                            pattern));
                    }
                    draw(ctx) {
                        if (!this.exploded) {
                            const ly = this.y + this.lineLength;
                            if (ly < canvas.height) {
                                ctx.strokeStyle = 'rgba(255,255,200,0.55)';
                                ctx.lineWidth = 1.1;
                                ctx.beginPath();
                                ctx.moveTo(this.x, ly);
                                ctx.lineTo(this.x, this.y);
                                ctx.stroke();
                            }
                            ctx.fillStyle = 'rgba(255,255,220,0.85)';
                            ctx.beginPath();
                            ctx.arc(this.x, this.y, 2, 0, 6.2832);
                            ctx.fill();
                        }
                    }
                }

                class Meteor {
                    constructor(x, y, colorConfig) {
                        this.x = x;
                        this.y = y;
                        this.speed = random(200, 400);
                        this.angle = random(Math.PI * 0.15, Math.PI * 0.85);
                        this.vx = Math.cos(this.angle) * this.speed;
                        this.vy = Math.sin(this.angle) * this.speed;
                        this.life = 1.0;
                        this.decayRate = random(0.2, 0.4);
                        this.baseSize = random(1.5, 3);
                        this.currentSize = this.baseSize;
                        this.trailX = new Float32Array(isMobile ? 6 : 10);
                        this.trailY = new Float32Array(isMobile ? 6 : 10);
                        this.trailS = new Float32Array(isMobile ? 6 : 10);
                        this.trailLen = 0;
                        this.trailMax = isMobile ? 6 : 10;
                        this.trailHead = 0;
                        this._rgb = hslToRgbPrefix(colorConfig.hue, colorConfig.saturation, colorConfig.lightness);
                        this._rgbBright = hslToRgbPrefix(colorConfig.hue, colorConfig.saturation, Math.min(colorConfig
                            .lightness + 15, 100));
                    }
                    update(deltaTime) {
                        const ds = deltaTime / 1000;
                        if (this.trailLen < this.trailMax) { this.trailX[this.trailLen] = this.x;
                            this.trailY[this.trailLen] = this.y;
                            this.trailS[this.trailLen] = this.currentSize * this.life;
                            this.trailLen++; } else { this.trailX[this.trailHead] = this.x;
                            this.trailY[this.trailHead] = this.y;
                            this.trailS[this.trailHead] = this.currentSize * this.life;
                            this.trailHead = (this.trailHead + 1) % this.trailMax; }
                        this.x += this.vx * ds;
                        this.y += this.vy * ds;
                        this.vy += GRAVITY * 0.8 * ds;
                        this.life -= this.decayRate * ds;
                        this.currentSize = this.baseSize * this.life;
                        return this.life > 0 && this.y < canvas.height + 50;
                    }
                    draw(ctx) {
                        const alpha = Math.max(0, this.life);
                        for (let i = 0; i < this.trailLen; i++) {
                            const ratio = i / this.trailLen;
                            ctx.fillStyle = this._rgbBright + (alpha * ratio * 0.5) + ')';
                            const ts = this.trailS[i] * ratio;
                            ctx.fillRect(this.trailX[i] - ts, this.trailY[i] - ts, ts * 2, ts * 2);
                        }
                        ctx.fillStyle = this._rgb + alpha + ')';
                        const cs = this.currentSize;
                        ctx.fillRect(this.x - cs, this.y - cs, cs * 2, cs * 2);
                    }
                }

                class FireTreeParticle {
                    constructor(x, y, colorConfig, power) {
                        this.originX = x;
                        this.originY = y;
                        this.power = power || 1;
                        const ba = random(0, 1);
                        this.branchAngle = ba < 0.2 ? 0 : (ba < 0.5 ? random(0.1, 0.3) : (ba < 0.8 ? random(0.3, 0.6) :
                            random(0.6, 0.9)));
                        this.branchSign = random(0, 1) > 0.5 ? 1 : -1;
                        this.branchAngle *= this.branchSign;
                        const baseSpeed = random(280, 480) * power;
                        const speedFactor = 1 - Math.abs(this.branchAngle) * 0.15;
                        this.vy = -baseSpeed * speedFactor;
                        this.vx = this.branchAngle * baseSpeed * 0.35;
                        this.x = x + this.branchAngle * 12;
                        this.y = y;
                        this.baseSize = random(1.5, 3.5);
                        this.baseSize *= (1 - Math.abs(this.branchAngle) * 0.25);
                        this.currentSize = this.baseSize;
                        this.life = 1.0;
                        this.sparkTimer = 0;
                        this.decayRate = random(0.04, 0.09);
                        this.trailLen = 0;
                        this.trailMax = isMobile ? 8 : 14;
                        this.trailHead = 0;
                        this.trailX = new Float32Array(this.trailMax);
                        this.trailY = new Float32Array(this.trailMax);
                        this.phase = 0;
                        this.phaseTimer = 0;
                        this.phaseDuration = random(350, 600) * (1 - Math.abs(this.branchAngle) * 0.25) + 150;
                        this.sideSign = this.branchAngle >= 0 ? 1 : -1;
                        const hueOffset = Math.abs(this.branchAngle) * 20;
                        const warmHue = colorConfig.type === 'chrysanthemum' ? random(25 + hueOffset, 55 + hueOffset) : (
                            colorConfig.hue + hueOffset * 0.3);
                        this._rgb = hslToRgbPrefix(warmHue, 100, 78);
                        this._rgbBright = hslToRgbPrefix(warmHue, 100, 92);
                        this._rgbCore = hslToRgbPrefix(warmHue, 100, 65);
                        this._colorConfig = colorConfig;
                    }
                    update(deltaTime) {
                        const ds = deltaTime / 1000;
                        this.phaseTimer += deltaTime;
                        if (this.trailLen < this.trailMax) { this.trailX[this.trailLen] = this.x;
                            this.trailY[this.trailLen] = this.y;
                            this.trailLen++; } else { this.trailX[this.trailHead] = this.x;
                            this.trailY[this.trailHead] = this.y;
                            this.trailHead = (this.trailHead + 1) % this.trailMax; }
                        if (this.phase === 0) {
                            this.x += this.vx * ds;
                            this.y += this.vy * ds;
                            this.vy += GRAVITY * 0.3 * ds;
                            this.vx += this.branchAngle * 60 * ds;
                            if (this.phaseTimer > this.phaseDuration || this.vy > 0) {
                                this.phase = 1;
                                const fallSpread = this.branchAngle + random(-0.3, 0.3);
                                this.vx = (this.vx * 0.3) + Math.sin(fallSpread) * random(40, 160) * this.power;
                                this.vy = random(20, 80);
                            }
                        } else {
                            this.x += this.vx * ds;
                            this.y += this.vy * ds;
                            this.vy += GRAVITY * 0.5 * ds;
                            const damp = Math.exp(AIR_RES_EXP_CONST * ds * 0.7);
                            this.vx *= damp;
                            this.vy *= damp;
                            this.vx += WIND * random(-0.3, 0.3) * ds;
                        }
                        this.life -= this.decayRate * ds;
                        this.currentSize = this.baseSize * Math.max(0.1, this.life);
                        this.sparkTimer += deltaTime;
                        if (this.sparkTimer > (this.phase === 0 ? 100 : 50) && Math.random() < 0.45 && this.life > 0.2) {
                            this.sparkTimer = 0;
                            const spark = new Particle(this.x, this.y, this._colorConfig, 0.2);
                            spark.baseSize = random(0.4, 1.2);
                            spark.decayRate = random(0.3, 0.7);
                            spark._rgb = hslToRgbPrefix(random(25, 55), 100, 82);
                            spark._fireSparkRgb = hslToRgbPrefix(50, 100, 90);
                            particles.push(spark);
                        }
                        if (this.phase === 1 && Math.random() < 0.2 && this.life > 0.3) {
                            for (let k = 0; k < 2; k++) {
                                const miniSpark = new Particle(this.x + random(-4, 4), this.y + random(-4, 4), this
                                    ._colorConfig, 0.12);
                                miniSpark.baseSize = random(0.2, 0.6);
                                miniSpark.decayRate = random(0.5, 0.9);
                                miniSpark._rgb = this._rgbBright;
                                miniSpark._fireSparkRgb = this._rgbBright;
                                particles.push(miniSpark);
                            }
                        }
                        return this.life > 0 && this.y < canvas.height + 80;
                    }
                    draw(ctx) {
                        const alpha = Math.max(0, this.life);
                        if (alpha <= 0.01) return;
                        const cs = this.currentSize;
                        for (let i = 0; i < this.trailLen; i++) {
                            const ratio = i / this.trailLen;
                            const idx = (this.trailHead - this.trailLen + 1 + i + this.trailMax) % this.trailMax;
                            ctx.fillStyle = this._rgbBright + (alpha * ratio * 0.45) + ')';
                            const ts = cs * ratio * 0.7;
                            ctx.fillRect(this.trailX[idx] - ts, this.trailY[idx] - ts, ts * 2, ts * 2);
                        }
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, cs * 1.8, 0, 6.2832);
                        ctx.fillStyle = this._rgbBright + (alpha * 0.15) + ')';
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, cs * 0.5, 0, 6.2832);
                        ctx.fillStyle = this._rgbCore + alpha + ')';
                        ctx.fill();
                        ctx.fillStyle = 'rgba(255,255,240,' + (alpha * 0.7) + ')';
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, cs * 0.25, 0, 6.2832);
                        ctx.fill();
                    }
                }

                class ChrysanthemumParticle {
                    constructor(x, y, colorConfig, power, isSlow) {
                        this.x = x;
                        this.y = y;
                        const angle = random(0, Math.PI * 2);
                        const speed = isSlow ? random(20, 50) * power : random(80, 180) * power;
                        this.vx = Math.cos(angle) * speed;
                        this.vy = Math.sin(angle) * speed;
                        this.life = 1.0;
                        this.decayRate = random(0.04, 0.08);
                        this.isSlow = !!isSlow;
                        this.baseSize = isSlow ? random(2.5, 4.5) : random(0.8, 1.8);
                        this.currentSize = this.baseSize;
                        this.trailX = new Float32Array(isMobile ? 12 : 28);
                        this.trailY = new Float32Array(isMobile ? 12 : 28);
                        this.trailLen = 0;
                        this.trailMax = isMobile ? 12 : 28;
                        this.trailHead = 0;
                        const hue = colorConfig.hue + (isSlow ? random(-10, 10) : random(-20, 20));
                        const sat = colorConfig.saturation;
                        const lit = isSlow ? Math.min(colorConfig.lightness + 15, 100) : colorConfig.lightness;
                        this._rgb = hslToRgbPrefix(hue, sat, lit);
                        this._rgbBright = hslToRgbPrefix(hue, sat, Math.min(lit + 15, 100));
                        this._rgbGlow = hslToRgbPrefix(hue, sat, Math.min(lit + 25, 100));
                        this.age = 0;
                        this.sparkTimer = random(30, 80);
                        this._colorConfig = colorConfig;
                    }
                    update(deltaTime) {
                        const ds = deltaTime / 1000;
                        this.age += deltaTime;
                        if (this.trailLen < this.trailMax) { this.trailX[this.trailLen] = this.x;
                            this.trailY[this.trailLen] = this.y;
                            this.trailLen++; } else { this.trailX[this.trailHead] = this.x;
                            this.trailY[this.trailHead] = this.y;
                            this.trailHead = (this.trailHead + 1) % this.trailMax; }
                        this.x += this.vx * ds;
                        this.y += this.vy * ds;
                        this.vy += GRAVITY * (this.isSlow ? 0.15 : 0.25) * ds;
                        const airDamp = Math.exp(AIR_RES_EXP_CONST * (this.isSlow ? 0.3 : 0.5) * ds);
                        this.vx *= airDamp;
                        this.vy *= airDamp;
                        this.life -= this.decayRate * ds;
                        this.currentSize = this.baseSize * Math.max(0.1, this.life);
                        if (!this.isSlow && this.life > 0.3) {
                            this.sparkTimer -= deltaTime;
                            if (this.sparkTimer <= 0) {
                                this.sparkTimer = random(40, 100);
                                if (Math.random() < 0.25) {
                                    const spark = new Particle(this.x, this.y, this._colorConfig || { hue: 50,
                                        saturation: 100, lightness: 85, type: 'single' }, 0.2);
                                    spark.baseSize = random(0.4, 1.0);
                                    spark.decayRate = random(0.4, 0.7);
                                    spark._rgb = this._rgbBright;
                                    spark._fireSparkRgb = this._rgbBright;
                                    particles.push(spark);
                                }
                            }
                        }
                        return this.life > 0.01 && this.y < canvas.height + 80;
                    }
                    draw(ctx) {
                        const alpha = Math.max(0, this.life);
                        if (alpha <= 0.01) return;
                        const cs = this.currentSize;
                        for (let i = 0; i < this.trailLen; i++) {
                            const idx = (this.trailHead - this.trailLen + 1 + i + this.trailMax) % this.trailMax;
                            const ratio = i / this.trailLen;
                            const trailAlpha = alpha * (0.15 + ratio * 0.45);
                            const ts = cs * (0.4 + ratio * 0.6);
                            ctx.fillStyle = this._rgbBright + trailAlpha + ')';
                            ctx.fillRect(this.trailX[idx] - ts, this.trailY[idx] - ts, ts * 2, ts * 2);
                        }
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, cs * 2.5, 0, 6.2832);
                        ctx.fillStyle = this._rgbGlow + (alpha * 0.08) + ')';
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, cs, 0, 6.2832);
                        ctx.fillStyle = this._rgb + alpha + ')';
                        ctx.fill();
                        if (cs > 0.8) {
                            ctx.beginPath();
                            ctx.arc(this.x, this.y, cs * 0.35, 0, 6.2832);
                            ctx.fillStyle = this._rgbGlow + (alpha * 0.7) + ')';
                            ctx.fill();
                        }
                    }
                }

                function createRandomFirework() {
                    if (Math.random() < 0.22) return;
                    fireworks.push(new Firework(random(50, canvas.width - 50), random(canvas.height * 0.2, canvas.height *
                        EXPLOSION_HEIGHT_RATIO), getRandomColorConfig()));
                }

                function createSpecialFirework() {
                    if (isMobile && Math.random() < 0.7) return;
                    if (!isMobile && Math.random() < 0.5) return;
                    const sf = new Firework(random(100, canvas.width - 100), random(canvas.height * 0.15, canvas.height * 0.32),
                        getRandomColorConfig());
                    sf.explosionPower *= isMobile ? 1.2 : 1.45;
                    sf.maxExplosions = isMobile ? randomInt(3, 5) : randomInt(4, 8);
                    fireworks.push(sf);
                }

                function startAutoFire() {
                    if (isAutoFiring) return;
                    isAutoFiring = true;
                    setTimeout(function() { createRandomFirework(); }, 300);
                    setTimeout(function() { createRandomFirework(); }, 600);
                    if (!isMobile || Math.random() > 0.5) setTimeout(function() { createSpecialFirework(); }, 900);
                    setTimeout(function() { createRandomFirework(); }, 1200);
                    setTimeout(function() { createRandomFirework(); }, 1500);
                    autoFireInterval = setInterval(function() {
                        const now = Date.now();
                        if (now - lastFireworkTime > (isMobile ? 1100 : 900)) {
                            const count = isMobile ? (Math.random() > 0.6 ? 2 : 1) : (Math.random() > 0.3 ? 3 : (
                                Math.random() > 0.5 ? 2 : 1));
                            for (let i = 0; i < count; i++) {
                                (function(idx) {
                                    setTimeout(function() {
                                        if (isMobile) { Math.random() > 0.8 ? createSpecialFirework() :
                                            createRandomFirework(); } else { Math.random() > 0.6 ?
                                                createSpecialFirework() : createRandomFirework(); }
                                    }, idx * (isMobile ? 150 : 120));
                                })(i);
                            }
                            lastFireworkTime = now;
                        }
                    }, isMobile ? 1100 : 900);
                }

                const frameTimes = [];
                function animate(currentTime) {
                    const rawDt = currentTime - lastTime || 0;
                    const dt = Math.min(rawDt, 50);
                    lastTime = currentTime;
                    frameNow = Date.now();
                    frameTimes.push(rawDt);
                    if (frameTimes.length > 30) frameTimes.shift();
                    let avgFrame = 0;
                    for (let fi = 0; fi < frameTimes.length; fi++) avgFrame += frameTimes[fi];
                    avgFrame /= frameTimes.length;
                    const needsDowngrade = avgFrame > 20;
                    ctx.fillStyle = 'rgba(0,0,0,0.11)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    for (let i = fireworks.length - 1; i >= 0; i--) { if (!fireworks[i].update(dt)) removeAtSwap(
                        fireworks, i); }
                    for (let i = heartExplosions.length - 1; i >= 0; i--) { if (!heartExplosions[i].update(dt))
                        removeAtSwap(heartExplosions, i); }
                    for (let i = particles.length - 1; i >= 0; i--) { if (!particles[i].update(dt)) removeAtSwap(particles,
                        i); }
                    for (let i = textParticles.length - 1; i >= 0; i--) { if (!textParticles[i].update(dt)) removeAtSwap(
                            textParticles, i); }
                    for (let i = 0, len = fireworks.length; i < len; i++) fireworks[i].draw(ctx);
                    for (let i = 0, len = heartExplosions.length; i < len; i++) heartExplosions[i].draw(ctx);
                    for (let i = 0, len = particles.length; i < len; i++) particles[i].draw(ctx);
                    for (let i = 0, len = textParticles.length; i < len; i++) textParticles[i].draw(ctx);
                    const maxP = needsDowngrade ? (isMobile ? 600 : 1000) : (isMobile ? 1000 : 1600);
                    if (particles.length > maxP) { const excess = particles.length - (isMobile ? 500 : 800); if (excess > 0)
                            particles.splice(0, excess); }
                    if (textParticles.length > 300) textParticles.splice(0, textParticles.length - 250);
                    if (fireworks.length > (isMobile ? 6 : 10)) fireworks.splice(0, fireworks.length - (isMobile ? 4 : 8));
                    if (heartExplosions.length > (isMobile ? 2 : 3)) heartExplosions.splice(0, heartExplosions.length - (
                        isMobile ? 1 : 2));
                    fireworksAnimationId = requestAnimationFrame(animate);
                }

                let isPageVisible = true;
                document.addEventListener('visibilitychange', function() {
                    isPageVisible = !document.hidden;
                    if (!isPageVisible) {
                        if (fireworksAnimationId) { cancelAnimationFrame(fireworksAnimationId);
                            fireworksAnimationId = null; }
                        if (bgMusic) bgMusic.pause();
                    } else {
                        if (!fireworksAnimationId) { lastTime = performance.now();
                            frameTimes.length = 0;
                            animate(lastTime); }
                        if (bgMusic.paused && musicPlayed) bgMusic.play().catch(function() {});
                    }
                });

                lastTime = performance.now();
                animate(lastTime);
                startAutoFire();

                return {
                    launchTextSequential: launchTextSequential,
                    stop: function() {
                        if (fireworksAnimationId) cancelAnimationFrame(fireworksAnimationId);
                        if (autoFireInterval) clearInterval(autoFireInterval);
                        isAutoFiring = false;
                        fireworks.length = 0;
                        particles.length = 0;
                        heartExplosions.length = 0;
                        textParticles.length = 0;
                    }
                };
            }

            function init() {
                preloadMusic();
                fireworksSystem = initFireworksSystem();
            }

            document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
            window.addEventListener('load', function() { try { bgMusic.load(); } catch (error) {} });
            init();

            // ========== 春水映梨花 · 东风卷珠帘 生成逻辑 ==========
            function buildSpringPoemLayer() {
                const leftCurtain = document.getElementById('springCurtainLeft');
                const rightCurtain = document.getElementById('springCurtainRight');
                const strandCount = 20;
                const beadsPerStrand = 35;
                [leftCurtain, rightCurtain].forEach(curtain => {
                    for (let s = 0; s < strandCount; s++) {
                        const strand = document.createElement('div');
                        strand.className = 'spring-strand';
                        for (let b = 0; b < beadsPerStrand; b++) {
                            const bead = document.createElement('div');
                            bead.className = 'spring-bead';
                            const rand = Math.random();
                            if (rand < 0.2) bead.classList.add('amber');
                            else if (rand < 0.35) bead.classList.add('jade');
                            strand.appendChild(bead);
                        }
                        curtain.appendChild(strand);
                    }
                });

                const petalsContainer = document.getElementById('springPetalsContainer');
                const petalCount = 25;
                for (let i = 0; i < petalCount; i++) {
                    const petal = document.createElement('div');
                    petal.className = 'spring-petal';
                    const shape = document.createElement('div');
                    shape.className = 'petal-shape';
                    petal.appendChild(shape);
                    const leftPos = Math.random() * 95;
                    const duration = 7 + Math.random() * 14;
                    const delay = Math.random() * 12;
                    const size = 0.5 + Math.random() * 0.9;
                    const drift = (Math.random() - 0.5) * 200;
                    petal.style.cssText =
                        `left:${leftPos}%; top:-30px; animation-duration:${duration}s; animation-delay:${delay}s; --drift:${drift}px;`;
                    shape.style.cssText = `transform:scale(${size}); animation-duration:${3+Math.random()*5}s;`;
                    petalsContainer.appendChild(petal);
                }
            }

            buildSpringPoemLayer();

            // ========== 调度逻辑：诗句层 → 蛋糕层 ==========
            function scheduleSpringPoem() {
                function showSpringLayer() {
                    const layer = document.getElementById('springPoemLayer');
                    if (layer) {
                        layer.classList.add('visible');
                        // 诗句层显示后40秒，开始过渡到蛋糕层
                        scheduleCakeTransition();
                    }
                }

                function scheduleCakeTransition() {
                    // 40秒后开始淡出诗句层和祝福文字
                    setTimeout(function() {
                        const springLayer = document.getElementById('springPoemLayer');
                        const blessing = document.getElementById('blessingEl');
                        const sparks = document.querySelectorAll('.spark');
                        const springPoemText = document.getElementById('springPoemText');
                        const springCurtains = document.querySelectorAll('.spring-curtain');

                        if (springLayer) springLayer.classList.add('fade-out');
                        if (blessing) blessing.classList.add('fade-out');
                        if (springPoemText) springPoemText.style.opacity = '0';
                        springCurtains.forEach(c => c.style.opacity = '0');
                        sparks.forEach(s => s.classList.add('fade-out'));
                    }, 40000);

                    // 40s + 2s淡出 + 6s间隔 = 48s后显示蛋糕覆盖层
                    setTimeout(function() {
                        // 停止烟花系统
                        if (fireworksSystem && fireworksSystem.stop) {
                            fireworksSystem.stop();
                        }
                        // 显示蛋糕覆盖层
                        const cakeOverlay = document.getElementById('cakeOverlay');
                        if (cakeOverlay) {
                            cakeOverlay.classList.add('visible');
                        }
                    }, 48000);
                }

                // 监听entryOverlay的变化
                const observer = new MutationObserver(function(mutations) {
                    mutations.forEach(function(mutation) {
                        if (mutation.target.classList.contains('hide')) {
                            setTimeout(showSpringLayer, 45000);
                            observer.disconnect();
                        }
                    });
                });
                observer.observe(entryOverlay, { attributes: true, attributeFilter: ['class'] });

                // 如果entryOverlay已经被移除或隐藏，直接设置定时器
                if (!document.body.contains(entryOverlay) || entryOverlay.classList.contains('hide')) {
                    setTimeout(showSpringLayer, 45000);
                }
            }

            scheduleSpringPoem();

            // ========== 蛋糕许愿交互逻辑 ==========
            (function initCakeInteraction() {
                const flameMain = document.getElementById('flameMain');
                const flameSide = document.getElementById('flameSide');
                const smokeContainer = document.getElementById('smokeContainer');
                const cakeDarkOverlay = document.getElementById('cakeDarkOverlay');
                const wishText = document.getElementById('wishText');
                const flameGlow = document.getElementById('flameGlow');
                const cakeStage = document.getElementById('cakeStage');
                const cakePlatform = document.getElementById('cakePlatform');
                const cakeTapHint = document.getElementById('cakeTapHint');
                const cakeFlameTapIndicator = document.getElementById('cakeFlameTapIndicator');
                let blown = false;

                function blowOutCandles() {
                    if (blown) return;
                    blown = true;
                    if (cakeTapHint) cakeTapHint.classList.add('hidden');
                    if (cakeFlameTapIndicator) cakeFlameTapIndicator.classList.add('hidden');

                    [flameMain, flameSide].forEach(flame => {
                        if (!flame) return;
                        flame.style.opacity = '0';
                        flame.style.transform = 'translateX(-50%) scale(0.08)';
                    });
                    if (flameGlow) flameGlow.style.opacity = '0';
                    if (cakeStage) cakeStage.classList.add('zoom-in');
                    if (cakePlatform) cakePlatform.classList.add('platform-zoom');
                    setTimeout(() => { if (smokeContainer) smokeContainer.classList.add('rising'); }, 280);
                    setTimeout(() => { if (cakeDarkOverlay) cakeDarkOverlay.classList.add('dimmed'); }, 550);
                    setTimeout(() => { if (wishText) wishText.classList.add('visible'); }, 950);
                    let cycle = 0;
                    const interval = setInterval(() => {
                        cycle++;
                        if (smokeContainer) {
                            smokeContainer.classList.remove('rising');
                            void smokeContainer.offsetWidth;
                            smokeContainer.classList.add('rising');
                        }
                        if (cycle >= 4) {
                            clearInterval(interval);
                            setTimeout(() => { if (smokeContainer) smokeContainer.classList.remove(
                                'rising'); }, 3200);
                        }
                    }, 3000);
                }
                if (flameMain) {
                    flameMain.addEventListener('click', (e) => { e.stopPropagation();
                        blowOutCandles(); });
                    flameMain.addEventListener('touchstart', (e) => { e.preventDefault();
                        blowOutCandles(); });
                }
                if (flameSide) {
                    flameSide.addEventListener('click', (e) => { e.stopPropagation();
                        blowOutCandles(); });
                    flameSide.addEventListener('touchstart', (e) => { e.preventDefault();
                        blowOutCandles(); });
                }
            })();
        })();
    </script>
