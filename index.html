<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐</title>
    <link href="https://fonts.googleapis.cn/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Ma Shan Zheng', cursive, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            color: #333;
            overflow: hidden;
        }
        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            z-index: 1;
        }
        #page3 {
            opacity: 1;
            background: #000;
        }
        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .text-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 2;
            pointer-events: none;
        }

        /* ---------- 点击进入遮罩 ---------- */
        .entry-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            background: radial-gradient(ellipse at center, #0a0a1a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.8s ease-out;
        }
        .entry-overlay.hide {
            opacity: 0;
            pointer-events: none;
        }
        .entry-text {
            font-family: 'Ma Shan Zheng', cursive, sans-serif;
            font-size: clamp(1.8rem, 6vw, 3rem);
            color: #f5ecd7;
            text-shadow: 0 0 20px rgba(255,220,150,0.5), 0 0 40px rgba(255,200,100,0.3);
            letter-spacing: 0.3em;
            animation: entryPulse 2s ease-in-out infinite;
        }
        .entry-sub {
            font-family: 'Ma Shan Zheng', cursive, sans-serif;
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            color: rgba(245,236,215,0.5);
            margin-top: 1.5rem;
            letter-spacing: 0.2em;
        }
        @keyframes entryPulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* ---------- 星空祝福文字层 ---------- */
        .blessing {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            color: #f5ecd7;
            text-shadow:
                0 0 12px rgba(255, 220, 150, 0.6),
                0 0 30px rgba(255, 200, 100, 0.3),
                0 0 60px rgba(180, 160, 255, 0.2);
            opacity: 0;
            transition: opacity 2.5s ease-out;
            line-height: 2.2;
            letter-spacing: 0.15em;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }
        .blessing.visible {
            opacity: 1;
        }
        .blessing.floating {
            animation: gentleFloat 5s ease-in-out infinite;
        }
        .line1 {
            font-size: clamp(1.3rem, 4vw, 2rem);
            margin-bottom: 0.5rem;
            font-weight: 500;
            opacity: 0.85;
        }
        .line2 {
            font-size: clamp(1.6rem, 5vw, 2.6rem);
            font-weight: 600;
            margin-bottom: 0.8rem;
            background: linear-gradient(180deg, #fff8e7 0%, #ebd5b3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(255,215,140,0.5));
        }
        .line3 {
            font-size: clamp(1.2rem, 3.5vw, 1.8rem);
            margin-bottom: 1rem;
            opacity: 0.9;
        }
        .line4 {
            font-size: clamp(2rem, 7vw, 3.2rem);
            font-weight: bold;
            background: linear-gradient(180deg, #ffe7bf 0%, #d4af7a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 18px rgba(255,200,100,0.7));
            margin-top: 1rem;
            letter-spacing: 0.25em;
        }
        .signature {
            align-self: flex-end;
            margin-top: 2.5rem;
            margin-right: 2rem;
            font-size: clamp(1rem, 2.6vw, 1.4rem);
            font-style: italic;
            color: #e6d7b8;
            text-shadow: 0 0 10px rgba(255,220,140,0.5);
            letter-spacing: 0.2em;
            opacity: 0.85;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, -52%); }
        }

        /* 装饰星点 */
        .spark {
            position: fixed;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            z-index: 5;
            animation: sparkle 3s infinite;
            pointer-events: none;
        }
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(2.5); }
        }
    </style>
</head>
<body>
    <!-- 点击进入遮罩：解决微信/移动端无法自动播放音乐 -->
    <div class="entry-overlay" id="entryOverlay">
        <div class="entry-text">轻触进入</div>
        <div class="entry-sub">愿此刻星光为你而亮</div>
    </div>

    <div id="page3" class="page">
        <canvas id="fireworksCanvas"></canvas>
        <div class="text-container"></div>
        <audio id="bgMusic" loop preload="auto" autoplay>
            <source src="https://music.163.com/song/media/outer/url?id=2624235389.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- 星空祝福文字 -->
    <div class="blessing">
        <div class="line1">五月十日，孟夏初盈。</div>
        <div class="line2">欣逢吉诞，愿风禾尽起，万事清欢。</div>
        <div class="line3">祝你所遇皆良善，所行化坦途。</div>
        <div class="line4">生日快乐，日日是好日</div>
        <div class="signature">— DYH</div>
    </div>

    <!-- 装饰星点 -->
    <div class="spark" style="top:10%; left:15%; animation-delay:0s;"></div>
    <div class="spark" style="top:80%; left:85%; animation-delay:1.2s;"></div>
    <div class="spark" style="top:25%; left:75%; animation-delay:2.4s;"></div>
    <div class="spark" style="top:70%; left:20%; animation-delay:0.8s;"></div>
    <div class="spark" style="top:50%; left:5%; animation-delay:1.8s;"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('fireworksCanvas');
            const bgMusic = document.getElementById('bgMusic');

            let currentName = '';
            let musicPlayed = false;
            let fireworksSystem = null;
            let fireworksAnimationId = null;
            let isAutoFiring = false;
            let autoFireInterval = null;

            function getUrlParameter() {
                const urlParams = new URLSearchParams(window.location.search);
                const urlName = urlParams.get('name');
                if (urlName && urlName.trim()) return urlName.trim();
                return '朋友';
            }

            // ---- 音乐：通过点击遮罩触发（兼容微信浏览器） ----
            var entryOverlay = document.getElementById('entryOverlay');
            var overlayDismissed = false;

            function startMusic() {
                if (musicPlayed) return;
                bgMusic.volume = 0.3;
                bgMusic.currentTime = 0;
                bgMusic.play().then(function() {
                    musicPlayed = true;
                }).catch(function() {});
            }

            function dismissOverlay() {
                if (overlayDismissed) return;
                overlayDismissed = true;
                startMusic();
                entryOverlay.classList.add('hide');
                setTimeout(function() {
                    if (entryOverlay.parentNode) entryOverlay.parentNode.removeChild(entryOverlay);
                }, 1000);
            }

            // 遮罩点击/触摸 → 开始播放音乐 + 移除遮罩
            entryOverlay.addEventListener('touchstart', dismissOverlay, { passive: true });
            entryOverlay.addEventListener('click', dismissOverlay);

            // 微信浏览器专用：WeixinJSBridgeReady 事件
            if (typeof WeixinJSBridge !== 'undefined') {
                WeixinJSBridge.invoke('getNetworkType', {}, function() { startMusic(); });
            }
            document.addEventListener('WeixinJSBridgeReady', function() {
                startMusic();
            }, false);

            // 桌面浏览器：尝试自动播放，成功则自动隐藏遮罩
            function tryAutoPlay() {
                bgMusic.volume = 0.3;
                bgMusic.currentTime = 0;
                bgMusic.play().then(function() {
                    musicPlayed = true;
                    dismissOverlay();
                }).catch(function() {});
            }

            function preloadMusic() { try { bgMusic.load(); } catch (error) {} }

            function showNewYearGreeting() {
                if (fireworksSystem && fireworksSystem.launchText) {
                    var cx = window.innerWidth / 2;
                    var cy1 = window.innerHeight * 0.38;
                    var cy2 = window.innerHeight * 0.55;
                    fireworksSystem.launchTextSequential('四天前的你', cx, cy1, 0);
                    setTimeout(function() {
                        if (fireworksSystem && fireworksSystem.launchTextSequential) {
                            fireworksSystem.launchTextSequential('生日快乐！', cx, cy2, 0);
                        }
                    }, 1800);
                    setTimeout(function() {
                        var blessing = document.querySelector('.blessing');
                        if (blessing) {
                            blessing.classList.add('visible');
                            setTimeout(function() { blessing.classList.add('floating'); }, 2500);
                        }
                    }, 17500);
                }
            }

            // --- 性能优化 ---
            function removeAtSwap(arr, i) {
                var last = arr.length - 1;
                if (i < last) arr[i] = arr[last];
                arr.pop();
            }

            var _hslCache = new Map();
            function hslToRgbPrefix(h, s, l) {
                var key = (h << 16) | (s << 8) | l;
                var cached = _hslCache.get(key);
                if (cached !== undefined) return cached;
                s /= 100; l /= 100;
                var c = (1 - Math.abs(2 * l - 1)) * s;
                var x = c * (1 - Math.abs((h / 60) % 2 - 1));
                var m = l - c / 2;
                var r, g, b;
                if (h < 60) { r=c; g=x; b=0; }
                else if (h < 120) { r=x; g=c; b=0; }
                else if (h < 180) { r=0; g=c; b=x; }
                else if (h < 240) { r=0; g=x; b=c; }
                else if (h < 300) { r=x; g=0; b=c; }
                else { r=c; g=0; b=x; }
                var result = 'rgb(' + Math.round((r+m)*255) + ',' + Math.round((g+m)*255) + ',' + Math.round((b+m)*255) + ',';
                _hslCache.set(key, result);
                return result;
            }

            function initFireworksSystem() {
                var ctx = canvas.getContext('2d', { alpha: true });
                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
                resizeCanvas();
                var resizeTimeout;
                window.addEventListener('resize', function() {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(resizeCanvas, 100);
                });

                var fireworks = [];
                var particles = [];
                var heartExplosions = [];
                var textParticles = [];
                var lastFireworkTime = 0;

                var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
                var particleMultiplier = isMobile ? 0.55 : 0.85;
                var lastTime = 0;
                var frameNow = Date.now();

                var GRAVITY = 0.15;
                var EXPLOSION_HEIGHT_RATIO = 0.55;
                var WIND = 0.018;
                var AIR_RESISTANCE = 0.97;
                var AIR_RES_EXP_CONST = Math.log(AIR_RESISTANCE) * 60;

                var COLOR_PRESETS = [
                    { hue: 0, saturation: 100, lightness: 75, type: 'single' },
                    { hue: 30, saturation: 100, lightness: 75, type: 'single' },
                    { hue: 60, saturation: 100, lightness: 75, type: 'single' },
                    { hue: 120, saturation: 100, lightness: 75, type: 'single' },
                    { hue: 180, saturation: 100, lightness: 75, type: 'single' },
                    { hue: 240, saturation: 100, lightness: 75, type: 'single' },
                    { hue: 270, saturation: 100, lightness: 75, type: 'single' },
                    { hue: 300, saturation: 100, lightness: 75, type: 'single' },
                    { hue: 330, saturation: 100, lightness: 75, type: 'single' },
                    { hue: 15, saturation: 100, lightness: 70, type: 'gradient' },
                    { hue: 180, saturation: 100, lightness: 65, type: 'gradient' },
                    { hue: 280, saturation: 100, lightness: 70, type: 'gradient' },
                    { hue: 90, saturation: 100, lightness: 65, type: 'gradient' },
                    { hue: 0, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                    { hue: 30, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                    { hue: 60, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                    { hue: 90, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                    { hue: 120, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                    { hue: 150, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                    { hue: 180, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                    { hue: 210, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                    { hue: 240, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                    { hue: 270, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                    { hue: 300, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                    { hue: 330, saturation: 100, lightness: 70, type: 'chrysanthemum' },
                ];

                var EXPLOSION_PATTERNS = {
                    CIRCLE: 'circle', SPARKLE: 'sparkle', VORTEX: 'vortex', RAINBOW: 'rainbow',
                    RING: 'ring', SUN: 'sun', BURST: 'burst', CASCADE: 'cascade',
                    HEART: 'heart', METEOR_SHOWER: 'meteor_shower', FIRE_TREE: 'fire_tree',
                    ELLIPSE: 'ellipse', CHRYSANTHEMUM: 'chrysanthemum',
                    PARAMETRIC_CIRCLE: 'parametric_circle', PARAMETRIC_ELLIPSE: 'parametric_ellipse',
                    PARAMETRIC_STAR: 'parametric_star', SPIRAL_PARAMETRIC: 'spiral_parametric'
                };

                var random = function(min, max) { return Math.random() * (max - min) + min; };
                var randomInt = function(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; };

                // 预构建加权图案数组
                var weightedPatterns = (function() {
                    var wp = [];
                    var normalPatterns = [
                        EXPLOSION_PATTERNS.CIRCLE, EXPLOSION_PATTERNS.SPARKLE,
                        EXPLOSION_PATTERNS.VORTEX, EXPLOSION_PATTERNS.RAINBOW,
                        EXPLOSION_PATTERNS.RING, EXPLOSION_PATTERNS.SUN,
                        EXPLOSION_PATTERNS.BURST, EXPLOSION_PATTERNS.CASCADE
                    ];
                    var counts = [6, 6, 6, 6, 6, 5, 5, 5];
                    for (var i = 0; i < normalPatterns.length; i++) {
                        for (var j = 0; j < counts[i]; j++) wp.push(normalPatterns[i]);
                    }
                    for (var i = 0; i < 54; i++) wp.push(EXPLOSION_PATTERNS.PARAMETRIC_CIRCLE);
                    for (var i = 0; i < 18; i++) wp.push(EXPLOSION_PATTERNS.PARAMETRIC_ELLIPSE);
                    for (var i = 0; i < 14; i++) wp.push(EXPLOSION_PATTERNS.PARAMETRIC_STAR);
                    for (var i = 0; i < 4; i++) wp.push(EXPLOSION_PATTERNS.SPIRAL_PARAMETRIC);
                    for (var i = 0; i < 27; i++) wp.push(EXPLOSION_PATTERNS.HEART);
                    for (var i = 0; i < 18; i++) wp.push(EXPLOSION_PATTERNS.METEOR_SHOWER);
                    for (var i = 0; i < 11; i++) wp.push(EXPLOSION_PATTERNS.FIRE_TREE);
                    for (var i = 0; i < 7; i++) wp.push(EXPLOSION_PATTERNS.ELLIPSE);
                    for (var i = 0; i < 27; i++) wp.push(EXPLOSION_PATTERNS.CHRYSANTHEMUM);
                    return wp;
                })();

                function getRandomExplosionPattern() {
                    return weightedPatterns[randomInt(0, weightedPatterns.length - 1)];
                }

                function getRandomColorConfig(pattern) {
                    if (pattern === EXPLOSION_PATTERNS.CHRYSANTHEMUM) {
                        var cc = COLOR_PRESETS.filter(function(c) { return c.type === 'chrysanthemum'; });
                        return cc[randomInt(0, cc.length - 1)];
                    }
                    var c1 = COLOR_PRESETS[randomInt(0, COLOR_PRESETS.length - 1)];
                    if (Math.random() < 0.3) {
                        var c2 = COLOR_PRESETS[randomInt(0, COLOR_PRESETS.length - 1)];
                        return { hue: c1.hue, saturation: c1.saturation, lightness: c1.lightness, type: 'dual', secondHue: c2.hue, secondSaturation: c2.saturation, secondLightness: c2.lightness };
                    }
                    return c1;
                }

                // ============ 文字粒子（两种模式） ============
                var TextParticleMode = { SEQUENTIAL: 1, SCATTER: 2 };

                class TextParticle {
                    constructor(char, x, y, hue, opts) {
                        this.char = char;
                        this.x = x;
                        this.y = y;
                        this.hue = hue;
                        this.life = 1.0;
                        this.age = 0;
                        this.fontSize = (opts && opts.fontSize) || random(70, 110);
                        this.rotSpeed = random(-0.3, 0.3);
                        this.rotation = 0;
                        this.wobble = random(0, Math.PI * 2);
                        this._fontStr = 'bold ' + this.fontSize + 'px "Ma Shan Zheng",cursive,sans-serif';
                        this._glowFontStr = 'bold ' + (this.fontSize + 6) + 'px "Ma Shan Zheng",cursive,sans-serif';
                        this._glowRgb = hslToRgbPrefix(hue, 100, 85);
                        this._mainRgb = hslToRgbPrefix(hue, 100, 70);

                        this.mode = (opts && opts.mode) || TextParticleMode.SCATTER;
                        this.startDecayDelay = (opts && opts.startDecayDelay) || 0;
                        this.appearDelay = (opts && opts.appearDelay) || 0;
                        this.appeared = false;

                        if (this.mode === TextParticleMode.SEQUENTIAL) {
                            this.vx = random(-5, 5);
                            this.vy = random(-8, -2);
                            this.decayRate = random(0.18, 0.22);
                            this.targetX = x;
                            this.targetY = y;
                            this.currentAlpha = 0;
                            this.fadeInSpeed = random(0.8, 1.2);
                        } else {
                            var angle = random(0, Math.PI * 2);
                            var speed = random(160, 380);
                            this.vx = Math.cos(angle) * speed;
                            this.vy = Math.sin(angle) * speed - random(50, 160);
                            this.decayRate = random(0.12, 0.22);
                            this.currentAlpha = 1.0;
                        }
                    }
                    update(dt) {
                        var ds = dt / 1000;
                        this.age += dt;
                        if (this.age < this.appearDelay) return true;
                        if (!this.appeared) this.appeared = true;

                        if (this.mode === TextParticleMode.SEQUENTIAL) {
                            this.x += this.vx * ds;
                            this.y += this.vy * ds;
                            this.vy += GRAVITY * 0.03 * ds;
                            if (this.currentAlpha < 1.0) {
                                this.currentAlpha += this.fadeInSpeed * ds;
                                if (this.currentAlpha > 1.0) this.currentAlpha = 1.0;
                            }
                            if (this.age - this.appearDelay >= this.startDecayDelay) {
                                this.life -= this.decayRate * ds;
                                this.currentAlpha = Math.max(0, this.life);
                            }
                            this.rotation += this.rotSpeed * ds * 0.15;
                            this.wobble += ds * 1.5;
                        } else {
                            this.x += this.vx * ds;
                            this.y += this.vy * ds;
                            this.vy += GRAVITY * 0.5 * ds;
                            this.vx += WIND * random(-0.025, 0.025) * ds;
                            var airDamp = Math.exp(AIR_RES_EXP_CONST * ds);
                            this.vx *= airDamp;
                            this.vy *= airDamp;
                            if (this.age >= this.startDecayDelay) {
                                this.life -= this.decayRate * ds;
                            }
                            this.currentAlpha = this.life;
                            this.rotation += this.rotSpeed * ds;
                            this.wobble += ds * 3;
                        }

                        return this.life > 0 && this.y < canvas.height + 80;
                    }
                    draw(ctx) {
                        var alpha = this.currentAlpha;
                        if (alpha <= 0.01) return;
                        if (!this.appeared) return;
                        var rot = this.rotation + Math.sin(this.wobble) * (this.mode === TextParticleMode.SEQUENTIAL ? 0.03 : 0.1);
                        ctx.save();
                        ctx.translate(this.x, this.y);
                        ctx.rotate(rot);
                        ctx.font = this._glowFontStr;
                        ctx.fillStyle = this._glowRgb + (alpha * 0.25) + ')';
                        ctx.fillText(this.char, -(this.fontSize + 6) / 2, (this.fontSize + 6) / 2);
                        ctx.font = this._fontStr;
                        ctx.fillStyle = this._mainRgb + alpha + ')';
                        ctx.fillText(this.char, -this.fontSize / 2, this.fontSize / 2);
                        ctx.restore();
                    }
                }

                // 逐字顺序排列出现
                function launchTextSequential(text, cx, cy, startDecayDelay, fontSizeMin, fontSizeMax) {
                    startDecayDelay = startDecayDelay || 0;
                    var sw = window.innerWidth;
                    if (sw <= 375) {
                        fontSizeMin = fontSizeMin || 48;
                        fontSizeMax = fontSizeMax || 68;
                    } else if (sw <= 480) {
                        fontSizeMin = fontSizeMin || 58;
                        fontSizeMax = fontSizeMax || 82;
                    } else if (sw <= 768) {
                        fontSizeMin = fontSizeMin || 72;
                        fontSizeMax = fontSizeMax || 100;
                    } else {
                        fontSizeMin = fontSizeMin || 90;
                        fontSizeMax = fontSizeMax || 130;
                    }
                    var brightHues = [0, 20, 40, 55, 120, 180, 200, 260, 290, 320, 10, 340];
                    var chars = text.split('');
                    var charSpacing = fontSizeMin * 1.15;
                    var totalWidth = (chars.length - 1) * charSpacing;
                    if (totalWidth > sw * 0.9) {
                        charSpacing = (sw * 0.9) / (chars.length - 1);
                        totalWidth = (chars.length - 1) * charSpacing;
                    }
                    var startX = cx - totalWidth / 2;

                    for (var i = 0; i < chars.length; i++) {
                        var hue = brightHues[randomInt(0, brightHues.length - 1)];
                        var fontSize = random(fontSizeMin, fontSizeMax);
                        var charX = startX + i * charSpacing;
                        var charY = cy + random(-8, 8);
                        var appearDelay = i * 280;
                        var opts = {
                            mode: TextParticleMode.SEQUENTIAL,
                            startDecayDelay: startDecayDelay + 4000,
                            appearDelay: appearDelay,
                            fontSize: fontSize
                        };
                        textParticles.push(new TextParticle(chars[i], charX, charY, hue, opts));
                    }

                    var sparklePerChar = sw <= 480 ? 6 : 12;
                    for (var i = 0; i < chars.length; i++) {
                        (function(idx) {
                            setTimeout(function() {
                                var px = startX + idx * charSpacing;
                                for (var j = 0; j < sparklePerChar; j++) {
                                    var hue = brightHues[randomInt(0, brightHues.length - 1)];
                                    var p = new Particle(px + random(-15, 15), cy + random(-15, 15), { hue: hue, saturation: 100, lightness: 80, type: 'single' }, 0.35);
                                    p.baseSize = random(0.5, 1.8);
                                    p.decayRate = random(0.3, 0.6);
                                    particles.push(p);
                                }
                            }, idx * 280 + 100);
                        })(i);
                    }
                }

                // 随机散开出现
                function launchTextFirework(text, cx, cy, startDecayDelay, fontSizeMin, fontSizeMax) {
                    startDecayDelay = startDecayDelay || 0;
                    fontSizeMin = fontSizeMin || 70;
                    fontSizeMax = fontSizeMax || 110;
                    var brightHues = [0, 20, 40, 55, 120, 180, 200, 260, 290, 320, 10, 340];
                    var chars = text.split('');
                    for (var i = 0; i < chars.length; i++) {
                        var hue = brightHues[randomInt(0, brightHues.length - 1)];
                        var ox = random(-25, 25);
                        var oy = random(-25, 25);
                        var fontSize = random(fontSizeMin, fontSizeMax);
                        var opts = {
                            mode: TextParticleMode.SCATTER,
                            startDecayDelay: startDecayDelay,
                            fontSize: fontSize
                        };
                        textParticles.push(new TextParticle(chars[i], cx + ox, cy + oy, hue, opts));
                    }
                    for (var i = 0; i < 35; i++) {
                        var hue = brightHues[randomInt(0, brightHues.length - 1)];
                        var p = new Particle(cx + random(-25, 25), cy + random(-25, 25), { hue: hue, saturation: 100, lightness: 72, type: 'single' }, 0.55);
                        p.size = random(0.8, 2.8);
                        p.decayRate = random(0.16, 0.38);
                        particles.push(p);
                    }
                }

                class HeartExplosionManager {
                    constructor(x, y, colorConfig, explosionPower) {
                        this.x = x; this.y = y; this.colorConfig = colorConfig;
                        this.explosionPower = explosionPower; this.createdAt = frameNow;
                        this.lifetime = 1500; this.heartParticles = [];
                        this.createHeartParticles();
                    }
                    createHeartParticles() {
                        var baseCount = isMobile ? randomInt(60, 90) : randomInt(90, 140);
                        var particleCount = Math.floor(baseCount * particleMultiplier);
                        for (var i = 0; i < particleCount; i++) {
                            var t = (i / particleCount) * Math.PI * 2;
                            this.heartParticles.push(new SimplifiedHeartParticle(this.x, this.y, this.colorConfig, this.explosionPower, t));
                        }
                    }
                    update(deltaTime) {
                        var elapsed = frameNow - this.createdAt;
                        var hp = this.heartParticles;
                        for (var i = hp.length - 1; i >= 0; i--) hp[i].update(deltaTime, elapsed);
                        return elapsed < this.lifetime;
                    }
                    draw(ctx) {
                        var hp = this.heartParticles;
                        for (var i = 0, len = hp.length; i < len; i++) hp[i].draw(ctx);
                    }
                }

                class SimplifiedHeartParticle {
                    constructor(x, y, colorConfig, explosionPower, phase) {
                        this.originalX = x; this.originalY = y; this.colorConfig = colorConfig;
                        this.baseSize = random(1.5, 2.5); this.currentSize = this.baseSize;
                        this.life = 1.0; this.t = phase; this.scale = 5.5 * explosionPower;
                        this.twinkleSpeed = random(0.8, 1.5); this.twinklePhase = random(0, Math.PI * 2);
                        this.twinkleAmount = random(0.1, 0.2); this.x = x; this.y = y;
                        var hue = colorConfig.hue, sat = colorConfig.saturation, lit = colorConfig.lightness;
                        this._rgb = hslToRgbPrefix(hue, sat, lit);
                        this._dualRgb = colorConfig.type === 'dual' ? hslToRgbPrefix(colorConfig.secondHue || hue, colorConfig.secondSaturation || sat, colorConfig.secondLightness || lit) : null;
                        this.updatePositionFromParametric();
                    }
                    updatePositionFromParametric() {
                        var sinT = Math.sin(this.t); var cosT = Math.cos(this.t);
                        var cos2T = Math.cos(2 * this.t); var cos3T = Math.cos(3 * this.t); var cos4T = Math.cos(4 * this.t);
                        var heartX = 16 * sinT * sinT * sinT;
                        var heartY = 13 * cosT - 5 * cos2T - 2 * cos3T - cos4T;
                        this.x = this.originalX + heartX * this.scale;
                        this.y = this.originalY - heartY * this.scale;
                    }
                    update(deltaTime, elapsed) {
                        this.life = Math.max(0, 1 - elapsed / 1500);
                        if (Math.random() < 0.3) { this.x += random(-0.8, 0.8); this.y += random(-0.8, 0.8); }
                        var twinkle = Math.sin(frameNow * 0.001 * this.twinkleSpeed + this.twinklePhase) * this.twinkleAmount;
                        this.currentSize = this.baseSize * (1 + twinkle) * this.life;
                        return this.life > 0;
                    }
                    draw(ctx) {
                        var alpha = this.life * 0.9;
                        var rgb = this._dualRgb && Math.random() > 0.5 ? this._dualRgb : this._rgb;
                        ctx.fillStyle = rgb + alpha + ')';
                        var s = this.currentSize;
                        if (s < 2) { ctx.fillRect(this.x - s, this.y - s, s * 2, s * 2); }
                        else { ctx.beginPath(); ctx.arc(this.x, this.y, s, 0, 6.2832); ctx.fill(); }
                    }
                }

                class Meteor {
                    constructor(x, y, colorConfig) {
                        this.x = x; this.y = y; this.speed = random(200, 400);
                        this.angle = random(Math.PI * 0.15, Math.PI * 0.85);
                        this.vx = Math.cos(this.angle) * this.speed; this.vy = Math.sin(this.angle) * this.speed;
                        this.life = 1.0; this.decayRate = random(0.2, 0.4);
                        this.baseSize = random(1.5, 3); this.currentSize = this.baseSize;
                        this.trailX = new Float32Array(isMobile ? 6 : 10);
                        this.trailY = new Float32Array(isMobile ? 6 : 10);
                        this.trailS = new Float32Array(isMobile ? 6 : 10);
                        this.trailLen = 0; this.trailMax = isMobile ? 6 : 10; this.trailHead = 0;
                        this._rgb = hslToRgbPrefix(colorConfig.hue, colorConfig.saturation, colorConfig.lightness);
                        this._rgbBright = hslToRgbPrefix(colorConfig.hue, colorConfig.saturation, Math.min(colorConfig.lightness + 15, 100));
                    }
                    update(deltaTime) {
                        var ds = deltaTime / 1000;
                        if (this.trailLen < this.trailMax) {
                            this.trailX[this.trailLen] = this.x; this.trailY[this.trailLen] = this.y;
                            this.trailS[this.trailLen] = this.currentSize * this.life; this.trailLen++;
                        } else {
                            this.trailX[this.trailHead] = this.x; this.trailY[this.trailHead] = this.y;
                            this.trailS[this.trailHead] = this.currentSize * this.life;
                            this.trailHead = (this.trailHead + 1) % this.trailMax;
                        }
                        this.x += this.vx * ds; this.y += this.vy * ds;
                        this.vy += GRAVITY * 0.8 * ds;
                        this.life -= this.decayRate * ds;
                        this.currentSize = this.baseSize * this.life;
                        return this.life > 0 && this.y < canvas.height + 50;
                    }
                    draw(ctx) {
                        var alpha = Math.max(0, this.life);
                        for (var i = 0; i < this.trailLen; i++) {
                            var ratio = i / this.trailLen;
                            ctx.fillStyle = this._rgbBright + (alpha * ratio * 0.5) + ')';
                            var ts = this.trailS[i] * ratio;
                            ctx.fillRect(this.trailX[i] - ts, this.trailY[i] - ts, ts * 2, ts * 2);
                        }
                        ctx.fillStyle = this._rgb + alpha + ')';
                        var cs = this.currentSize;
                        ctx.fillRect(this.x - cs, this.y - cs, cs * 2, cs * 2);
                    }
                }

                class FireTreeParticle {
                    constructor(x, y, colorConfig) {
                        this.x = x; this.y = y; this.baseSize = random(1, 2.5);
                        this.currentSize = this.baseSize; this.fallSpeed = random(60, 150);
                        this.vx = random(-30, 30); this.vy = random(-80, -20);
                        this.life = 1.0; this.decayRate = random(0.15, 0.3); this.sparkTimer = 0;
                        this._rgb = hslToRgbPrefix(colorConfig.hue, colorConfig.saturation, colorConfig.lightness);
                        this._colorConfig = colorConfig;
                    }
                    update(deltaTime) {
                        var ds = deltaTime / 1000;
                        this.x += this.vx * ds; this.y += this.vy * ds;
                        this.vy += this.fallSpeed * ds;
                        this.vx *= Math.exp(AIR_RES_EXP_CONST * ds);
                        this.life -= this.decayRate * ds;
                        this.currentSize = this.baseSize * this.life;
                        this.sparkTimer += deltaTime;
                        if (this.sparkTimer > 80 && Math.random() < 0.3 && this.life > 0.3) {
                            this.sparkTimer = 0;
                            var spark = new Particle(this.x, this.y, this._colorConfig, 0.3);
                            spark.baseSize = random(0.5, 1.2); spark.decayRate = random(0.4, 0.7);
                            particles.push(spark);
                        }
                        return this.life > 0 && this.y < canvas.height + 50;
                    }
                    draw(ctx) {
                        var alpha = Math.max(0, this.life);
                        ctx.fillStyle = this._rgb + alpha + ')';
                        var cs = this.currentSize;
                        if (cs < 2) { ctx.fillRect(this.x - cs, this.y - cs, cs * 2, cs * 2); }
                        else { ctx.beginPath(); ctx.arc(this.x, this.y, cs, 0, 6.2832); ctx.fill(); }
                    }
                }

                class ChrysanthemumParticle {
                    constructor(x, y, colorConfig, power) {
                        this.x = x; this.y = y;
                        var angle = random(0, Math.PI * 2); var speed = random(100, 280) * power;
                        this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                        this.life = 1.0; this.decayRate = random(0.06, 0.14);
                        this.baseSize = random(1.2, 2.5); this.currentSize = this.baseSize;
                        this.trailX = new Float32Array(isMobile ? 8 : 14);
                        this.trailY = new Float32Array(isMobile ? 8 : 14);
                        this.trailLen = 0; this.trailMax = isMobile ? 8 : 14; this.trailHead = 0;
                        this._rgb = hslToRgbPrefix(colorConfig.hue, colorConfig.saturation, colorConfig.lightness);
                        this._rgbBright = hslToRgbPrefix(colorConfig.hue, colorConfig.saturation, Math.min(colorConfig.lightness + 10, 100));
                    }
                    update(deltaTime) {
                        var ds = deltaTime / 1000;
                        if (this.trailLen < this.trailMax) {
                            this.trailX[this.trailLen] = this.x; this.trailY[this.trailLen] = this.y; this.trailLen++;
                        } else {
                            this.trailX[this.trailHead] = this.x; this.trailY[this.trailHead] = this.y;
                            this.trailHead = (this.trailHead + 1) % this.trailMax;
                        }
                        this.x += this.vx * ds; this.y += this.vy * ds;
                        this.vy += GRAVITY * 0.7 * ds;
                        var airDamp = Math.exp(AIR_RES_EXP_CONST * ds);
                        this.vx *= airDamp; this.vy *= airDamp;
                        this.life -= this.decayRate * ds;
                        this.currentSize = this.baseSize * this.life;
                        return this.life > 0 && this.y < canvas.height + 50;
                    }
                    draw(ctx) {
                        var alpha = Math.max(0, this.life);
                        for (var i = 0; i < this.trailLen; i++) {
                            var ratio = i / this.trailLen;
                            ctx.fillStyle = this._rgbBright + (alpha * ratio * 0.4) + ')';
                            var ts = this.currentSize * ratio;
                            ctx.fillRect(this.trailX[i] - ts, this.trailY[i] - ts, ts * 2, ts * 2);
                        }
                        ctx.fillStyle = this._rgb + alpha + ')';
                        var cs = this.currentSize;
                        ctx.fillRect(this.x - cs, this.y - cs, cs * 2, cs * 2);
                    }
                }

                class Particle {
                    constructor(x, y, colorConfig, explosionPower, explosionPattern) {
                        this.x = x; this.y = y;
                        this.explosionPower = explosionPower || 1;
                        this.explosionPattern = explosionPattern || 'circle';
                        this.baseSize = random(0.9, 2.3) * (this.explosionPattern.indexOf('SPARKLE') >= 0 ? 0.82 : 0.98);
                        this.size = this.baseSize; this.isFireSpark = true;
                        this.fireSparkDuration = random(0.12, 0.32);
                        this.life = 1.0; this.decayRate = random(0.13, 0.36);
                        this.verticalWeight = random(0.55, 1.1); this.createdAt = frameNow;
                        var baseSpeed = random(185, 350) * this.explosionPower;
                        var angle = random(0, Math.PI * 2);
                        this.vx = Math.cos(angle) * baseSpeed; this.vy = Math.sin(angle) * baseSpeed;
                        if (this.explosionPattern === 'sparkle') { this.vx *= 0.65; this.vy *= 0.65; }
                        if (this.explosionPattern.indexOf('PARAMETRIC') < 0) {
                            this.vx += random(-35, 35); this.vy += random(-35, 35);
                        }
                        this._rgb = hslToRgbPrefix(colorConfig.hue, colorConfig.saturation, colorConfig.lightness);
                        this._fireSparkRgb = hslToRgbPrefix(60, 100, 88);
                    }
                    update(deltaTime) {
                        var ds = deltaTime / 1000;
                        this.x += this.vx * ds; this.y += this.vy * ds;
                        this.vy += GRAVITY * this.verticalWeight * ds;
                        this.vx += WIND * random(-0.016, 0.016) * ds;
                        var airDamp = Math.exp(AIR_RES_EXP_CONST * ds);
                        this.vx *= airDamp; this.vy *= airDamp;
                        this.life -= this.decayRate * ds;
                        var aliveTime = (frameNow - this.createdAt) / 1000;
                        if (this.isFireSpark && aliveTime > this.fireSparkDuration) this.isFireSpark = false;
                        this.size = this.baseSize * this.life;
                        return this.life > 0 && this.y < canvas.height + 90;
                    }
                    draw(ctx) {
                        var alpha = this.life;
                        if (alpha <= 0) return;
                        if (this.isFireSpark) { ctx.fillStyle = this._fireSparkRgb + (alpha * 0.88) + ')'; }
                        else { ctx.fillStyle = this._rgb + (alpha * 0.82) + ')'; }
                        var s = this.size;
                        if (s < 2) { ctx.fillRect(this.x - s, this.y - s, s * 2, s * 2); }
                        else { ctx.beginPath(); ctx.arc(this.x, this.y, s, 0, 6.2832); ctx.fill(); }
                    }
                }

                class Firework {
                    constructor(x, targetY, colorConfig) {
                        this.x = x; this.y = canvas.height; this.targetY = targetY;
                        this.colorConfig = colorConfig; this.speed = random(380, 620);
                        this.exploded = false; this.explosionPower = random(1.25, 2.1);
                        this.explosionPattern = getRandomExplosionPattern();
                        this.lineLength = random(11, 28); this.explosionCount = 0;
                        this.maxExplosions = isMobile ? randomInt(2, 4) : randomInt(3, 6);
                    }
                    update(deltaTime) {
                        if (!this.exploded) {
                            var ds = deltaTime / 1000;
                            this.y -= this.speed * ds;
                            if (this.y <= this.targetY) { this.explode(); return false; }
                            return true;
                        }
                        return false;
                    }
                    explode() {
                        this.exploded = true; this.explosionCount++;
                        this.createExplosion(this.x, this.y, this.explosionPower * (isMobile ? 1.0 : 1.2), this.explosionPattern);
                        if (this.explosionCount < this.maxExplosions) {
                            setTimeout(() => { this.createSubsequentExplosion(); }, isMobile ? random(150, 400) : random(120, 350));
                        }
                    }
                    createSubsequentExplosion() {
                        this.explosionCount++;
                        var distance = random(70, 185); var angle = random(0, Math.PI * 2);
                        var newX = this.x + Math.cos(angle) * distance;
                        var newY = this.y + Math.sin(angle) * distance;
                        this.createExplosion(newX, newY, this.explosionPower * (isMobile ? random(0.5, 0.8) : random(0.6, 0.9)), this.explosionPattern);
                        if (this.explosionCount < this.maxExplosions) {
                            setTimeout(() => { this.createSubsequentExplosion(); }, isMobile ? random(150, 400) : random(120, 350));
                        }
                    }
                    createExplosion(x, y, power, pattern) {
                        if (pattern === EXPLOSION_PATTERNS.HEART) { heartExplosions.push(new HeartExplosionManager(x, y, this.colorConfig, power)); return; }
                        if (pattern === EXPLOSION_PATTERNS.METEOR_SHOWER) {
                            var mc = Math.floor((isMobile ? randomInt(5, 10) : randomInt(8, 14)) * particleMultiplier);
                            for (var i = 0; i < mc; i++) { var m = new Meteor(x + random(-32, 32), y + random(-32, 32), this.colorConfig); m.speed *= power; particles.push(m); }
                            return;
                        }
                        if (pattern === EXPLOSION_PATTERNS.FIRE_TREE) {
                            var tc = Math.floor((isMobile ? randomInt(25, 40) : randomInt(40, 60)) * particleMultiplier);
                            for (var i = 0; i < tc; i++) { var ft = new FireTreeParticle(x + random(-22, 22), y + random(-22, 22), this.colorConfig); ft.baseSize *= power * 0.85; ft.fallSpeed *= power; particles.push(ft); }
                            return;
                        }
                        if (pattern === EXPLOSION_PATTERNS.CHRYSANTHEMUM) {
                            var cc = Math.floor((isMobile ? randomInt(60, 90) : randomInt(90, 140)) * particleMultiplier);
                            for (var i = 0; i < cc; i++) particles.push(new ChrysanthemumParticle(x, y, this.colorConfig, power));
                            return;
                        }
                        var pc = Math.floor(randomInt(55, 110) * particleMultiplier);
                        for (var i = 0; i < pc; i++) particles.push(new Particle(x, y, this.colorConfig, power, pattern));
                    }
                    draw(ctx) {
                        if (!this.exploded) {
                            var ly = this.y + this.lineLength;
                            if (ly < canvas.height) {
                                ctx.strokeStyle = 'rgba(255,255,200,0.55)'; ctx.lineWidth = 1.1;
                                ctx.beginPath(); ctx.moveTo(this.x, ly); ctx.lineTo(this.x, this.y); ctx.stroke();
                            }
                            ctx.fillStyle = 'rgba(255,255,220,0.85)';
                            ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, 6.2832); ctx.fill();
                        }
                    }
                }

                function createRandomFirework() {
                    if (Math.random() < 0.22) return;
                    fireworks.push(new Firework(random(50, canvas.width - 50), random(canvas.height * 0.2, canvas.height * EXPLOSION_HEIGHT_RATIO), getRandomColorConfig()));
                }
                function createSpecialFirework() {
                    if (isMobile && Math.random() < 0.7) return;
                    if (!isMobile && Math.random() < 0.5) return;
                    var sf = new Firework(random(100, canvas.width - 100), random(canvas.height * 0.15, canvas.height * 0.32), getRandomColorConfig());
                    sf.explosionPower *= isMobile ? 1.2 : 1.45;
                    sf.maxExplosions = isMobile ? randomInt(3, 5) : randomInt(4, 8);
                    fireworks.push(sf);
                }
                function startAutoFire() {
                    if (isAutoFiring) return;
                    isAutoFiring = true;
                    setTimeout(function() { createRandomFirework(); }, 300);
                    setTimeout(function() { createRandomFirework(); }, 600);
                    if (!isMobile || Math.random() > 0.5) setTimeout(function() { createSpecialFirework(); }, 900);
                    setTimeout(function() { createRandomFirework(); }, 1200);
                    setTimeout(function() { createRandomFirework(); }, 1500);
                    autoFireInterval = setInterval(function() {
                        var now = Date.now();
                        if (now - lastFireworkTime > (isMobile ? 1100 : 900)) {
                            var count = isMobile ? (Math.random() > 0.6 ? 2 : 1) : (Math.random() > 0.3 ? 3 : (Math.random() > 0.5 ? 2 : 1));
                            for (var i = 0; i < count; i++) {
                                (function(idx) {
                                    setTimeout(function() {
                                        if (isMobile) { Math.random() > 0.8 ? createSpecialFirework() : createRandomFirework(); }
                                        else { Math.random() > 0.6 ? createSpecialFirework() : createRandomFirework(); }
                                    }, idx * (isMobile ? 150 : 120));
                                })(i);
                            }
                            lastFireworkTime = now;
                        }
                    }, isMobile ? 1100 : 900);
                }

                var frameTimes = [];

                function animate(currentTime) {
                    var rawDt = currentTime - lastTime || 0;
                    var dt = Math.min(rawDt, 50);
                    lastTime = currentTime;
                    frameNow = Date.now();

                    frameTimes.push(rawDt);
                    if (frameTimes.length > 30) frameTimes.shift();
                    var avgFrame = 0;
                    for (var fi = 0; fi < frameTimes.length; fi++) avgFrame += frameTimes[fi];
                    avgFrame /= frameTimes.length;
                    var needsDowngrade = avgFrame > 20;

                    ctx.fillStyle = 'rgba(0,0,0,0.11)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    for (var i = fireworks.length - 1; i >= 0; i--) {
                        if (!fireworks[i].update(dt)) removeAtSwap(fireworks, i);
                    }
                    for (var i = heartExplosions.length - 1; i >= 0; i--) {
                        if (!heartExplosions[i].update(dt)) removeAtSwap(heartExplosions, i);
                    }
                    for (var i = particles.length - 1; i >= 0; i--) {
                        if (!particles[i].update(dt)) removeAtSwap(particles, i);
                    }
                    for (var i = textParticles.length - 1; i >= 0; i--) {
                        if (!textParticles[i].update(dt)) removeAtSwap(textParticles, i);
                    }

                    for (var i = 0, len = fireworks.length; i < len; i++) fireworks[i].draw(ctx);
                    for (var i = 0, len = heartExplosions.length; i < len; i++) heartExplosions[i].draw(ctx);
                    for (var i = 0, len = particles.length; i < len; i++) particles[i].draw(ctx);
                    for (var i = 0, len = textParticles.length; i < len; i++) textParticles[i].draw(ctx);

                    var maxP = needsDowngrade ? (isMobile ? 600 : 1000) : (isMobile ? 1000 : 1600);
                    if (particles.length > maxP) {
                        var excess = particles.length - (isMobile ? 500 : 800);
                        if (excess > 0) particles.splice(0, excess);
                    }
                    if (textParticles.length > 300) textParticles.splice(0, textParticles.length - 250);
                    if (fireworks.length > (isMobile ? 6 : 10)) fireworks.splice(0, fireworks.length - (isMobile ? 4 : 8));
                    if (heartExplosions.length > (isMobile ? 2 : 3)) heartExplosions.splice(0, heartExplosions.length - (isMobile ? 1 : 2));

                    fireworksAnimationId = requestAnimationFrame(animate);
                }

                var isPageVisible = true;
                document.addEventListener('visibilitychange', function() {
                    isPageVisible = !document.hidden;
                    if (!isPageVisible) {
                        if (fireworksAnimationId) { cancelAnimationFrame(fireworksAnimationId); fireworksAnimationId = null; }
                        if (bgMusic) bgMusic.pause();
                    } else {
                        if (!fireworksAnimationId) { lastTime = performance.now(); frameTimes.length = 0; animate(lastTime); }
                        if (bgMusic.paused && musicPlayed) bgMusic.play().catch(function() {});
                    }
                });

                lastTime = performance.now();
                animate(lastTime);
                startAutoFire();

                return {
                    launchText: launchTextFirework,
                    launchTextSequential: launchTextSequential,
                    stop: function() {
                        if (fireworksAnimationId) cancelAnimationFrame(fireworksAnimationId);
                        if (autoFireInterval) clearInterval(autoFireInterval);
                        isAutoFiring = false;
                        fireworks.length = 0; particles.length = 0; heartExplosions.length = 0; textParticles.length = 0;
                    }
                };
            }

            function init() {
                currentName = getUrlParameter();
                preloadMusic();
                fireworksSystem = initFireworksSystem();
                tryAutoPlay();
                showNewYearGreeting();
            }

            document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
            window.addEventListener('load', function() { try { bgMusic.load(); } catch (error) {} });
            init();
        });
    </script>
